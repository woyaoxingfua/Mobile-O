name: Build Unsigned IPA Simple (iOS 18.1)

on:
  workflow_dispatch:
    inputs:
      build_configuration:
        description: 'Build Configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  XCODE_VERSION: "16.0"

jobs:
  build:
    name: Build Simple Unsigned IPA
    runs-on: macos-15
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Select Xcode Version and Install iOS SDK
      run: |
        sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
        xcodebuild -version
        
        # 显示并安装 iOS SDK
        xcodebuild -showsdks
        sudo xcodebuild -downloadPlatform iOS -buildVersion 18.1 || true
        sudo xcodebuild -runFirstLaunch
        
    - name: Modify Project for Unsigned Build
      working-directory: Mobile-O-App/app
      run: |
        PROJECT_FILE="MobileO.xcodeproj/project.pbxproj"
        
        # 备份
        cp "$PROJECT_FILE" "$PROJECT_FILE.backup"
        
        # 修改部署目标为 18.1
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/g' "$PROJECT_FILE"
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/g' "$PROJECT_FILE"
        
        # 禁用代码签名
        sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
        sed -i '' 's/DEVELOPMENT_TEAM = Q3GRH2LZ7S;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"
        
    - name: Build .app (No Signing)
      working-directory: Mobile-O-App/app
      run: |
        CONFIG="${{ github.event.inputs.build_configuration }}"
        BUILD_DIR="build/Products"
        
        mkdir -p "$BUILD_DIR"
        
        # 直接构建 .app 文件
        xcodebuild build \
          -project MobileO.xcodeproj \
          -scheme MobileO \
          -configuration "$CONFIG" \
          -sdk iphoneos \
          -derivedDataPath "build/DerivedData" \
          CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          IPHONEOS_DEPLOYMENT_TARGET=18.1 \
          ONLY_ACTIVE_ARCH=NO \
          ARCHS="arm64" \
          ENABLE_BITCODE=NO \
          -skipPackagePluginValidation \
          -skipMacroValidation
          
    - name: Package IPA
      working-directory: Mobile-O-App/app
      run: |
        BUILD_DIR="build/Products"
        OUTPUT_DIR="build/output"
        
        mkdir -p "$OUTPUT_DIR"
        
        # 找到 .app 文件
        APP_PATH=$(find "$BUILD_DIR" -name "MobileO.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "错误: 未找到 .app 文件"
          find build -name "*.app" -type d
          exit 1
        fi
        
        echo "找到 App: $APP_PATH"
        
        # 创建 Payload
        mkdir -p "$OUTPUT_DIR/Payload"
        cp -R "$APP_PATH" "$OUTPUT_DIR/Payload/"
        
        # 清理签名
        rm -rf "$OUTPUT_DIR/Payload/MobileO.app/_CodeSignature"
        
        # 打包
        cd "$OUTPUT_DIR"
        zip -r "MobileO_Unsigned_iOS18.1.ipa" Payload
        rm -rf Payload
        
        # 显示结果
        ls -lh "MobileO_Unsigned_iOS18.1.ipa"
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: MobileO-Unsigned-iOS18.1-Simple
        path: Mobile-O-App/app/build/output/MobileO_Unsigned_iOS18.1.ipa
        if-no-files-found: error
