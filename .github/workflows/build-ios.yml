name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version
          sudo xcodebuild -downloadPlatform iOS || true
      
      - name: Modify Project Settings
        working-directory: Mobile-O-App/app
        run: |
          PROJECT_FILE="MobileO.xcodeproj/project.pbxproj"
          
          # 修改 iOS 版本
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          
          # 禁用代码签名
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/DEVELOPMENT_TEAM = Q3GRH2LZ7S;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"
          
          echo "=== 验证修改 ==="
          grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -5
      
      - name: Build Archive
        working-directory: Mobile-O-App/app
        run: |
          # 使用 archive 构建（确保 Frameworks 被正确嵌入）
          xcodebuild clean archive \
            -project MobileO.xcodeproj \
            -scheme MobileO \
            -configuration Release \
            -archivePath "build/MobileO.xcarchive" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal -Xfrontend -disable-availability-checking" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            2>&1 | tee build.log
          
          # 检查 archive 是否生成
          if [ ! -d "build/MobileO.xcarchive" ]; then
            echo "ERROR: Archive 未生成"
            tail -100 build.log
            exit 1
          fi
          
          echo "=== Archive 生成成功 ==="
          ls -la build/MobileO.xcarchive/Products/Applications/
      
      - name: Package IPA with Embedded Frameworks
        working-directory: Mobile-O-App/app
        run: |
          ARCHIVE_APP="build/MobileO.xcarchive/Products/Applications/MobileO.app"
          
          if [ ! -d "$ARCHIVE_APP" ]; then
            echo "ERROR: 未找到 Archive 中的 .app"
            find build -name "*.app" -type d
            exit 1
          fi
          
          echo "=== 检查原始 .app 结构 ==="
          ls -la "$ARCHIVE_APP"
          
          echo "=== 检查 Frameworks ==="
          ls -la "$ARCHIVE_APP/Frameworks" 2>/dev/null || echo "⚠️ 没有 Frameworks 目录！"
          
          # 创建 Payload
          rm -rf Payload
          mkdir -p Payload
          
          # 复制 .app
          cp -R "$ARCHIVE_APP" Payload/
          
          # 清理签名
          rm -rf Payload/MobileO.app/_CodeSignature
          rm -f Payload/MobileO.app/embedded.mobileprovision 2>/dev/null || true
          
          # 验证 Info.plist
          echo "=== Info.plist ==="
          plutil -p Payload/MobileO.app/Info.plist | grep -E "CFBundleExecutable|CFBundleIdentifier|MinimumOSVersion"
          
          # 验证可执行文件
          echo "=== 可执行文件 ==="
          ls -la Payload/MobileO.app/MobileO
          file Payload/MobileO.app/MobileO
          
          # 创建 IPA
          zip -qr9 MobileO_iOS18.ipa Payload
          
          echo "=== IPA 信息 ==="
          ls -lh MobileO_iOS18.ipa
          unzip -l MobileO_iOS18.ipa | head -40
          
          # 最终验证
          echo "=== 最终验证 ==="
          rm -rf verify
          mkdir verify && cd verify
          unzip -q ../MobileO_iOS18.ipa
          echo "解压后内容:"
          ls -la Payload/MobileO.app/
          echo "Frameworks:"
          ls -la Payload/MobileO.app/Frameworks/ 2>/dev/null | head -20
          cd .. && rm -rf verify
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-iOS18-Full
          path: Mobile-O-App/app/MobileO_iOS18.ipa
          
      - name: Upload Debug Info (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: |
            Mobile-O-App/app/build.log
            Mobile-O-App/app/build/
