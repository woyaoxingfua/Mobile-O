name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    env:
      APP_DIR: Mobile-O-App/app
      XCODEPROJ: MobileO.xcodeproj
      SCHEME: MobileO
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Modify Project for Unsigned Build
        shell: bash
        run: |
          PROJECT_FILE="${APP_DIR}/${XCODEPROJ}/project.pbxproj"
          
          # 修改 iOS 版本
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          
          # 禁用代码签名
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/DEVELOPMENT_TEAM = Q3GRH2LZ7S;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"
          
          echo "=== 验证配置 ==="
          grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -3

      - name: Build Archive (Embed All Dependencies)
        shell: bash
        run: |
          set -euxo pipefail
          
          # 使用 archive 构建，确保所有依赖都被正确处理
          # 添加更多参数解决 Swift 6 并发错误
          xcodebuild clean archive \
            -project "${APP_DIR}/${XCODEPROJ}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -archivePath "build/MobileO.xcarchive" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath "SourcePackages" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal -Xfrontend -disable-availability-checking -suppress-warnings" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            LD_RUNPATH_SEARCH_PATHS="@executable_path/Frameworks" \
            2>&1 | tee build.log || {
              echo "Archive 失败，尝试使用 build..."
              # 如果 archive 失败，使用 build + 手动嵌入
              xcodebuild clean build \
                -project "${APP_DIR}/${XCODEPROJ}" \
                -scheme "${SCHEME}" \
                -configuration "${CONFIGURATION}" \
                -sdk iphoneos \
                -destination "generic/platform=iOS" \
                -derivedDataPath "build/DerivedData" \
                -clonedSourcePackagesDirPath "SourcePackages" \
                CODE_SIGN_IDENTITY="" \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGNING_ALLOWED=NO \
                IPHONEOS_DEPLOYMENT_TARGET=18.0 \
                SWIFT_STRICT_CONCURRENCY=minimal \
                SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
                OTHER_SWIFT_FLAGS="-strict-concurrency=minimal -suppress-warnings" \
                ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
                2>&1 | tee build.log
            }
          
          echo "=== Archive/Build 内容 ==="
          find build -name "*.app" -o -name "*.framework" 2>/dev/null | head -30

      - name: Export and Package IPA
        shell: bash
        run: |
          set -euxo pipefail
          
          # 尝试从 Archive 获取 .app，否则从 DerivedData 获取
          if [ -d "build/MobileO.xcarchive" ]; then
            APP_PATH="build/MobileO.xcarchive/Products/Applications/${SCHEME}.app"
            echo "使用 Archive 构建的 .app"
          else
            APP_PATH=$(find build/DerivedData -name "${SCHEME}.app" -type d | head -1)
            echo "使用 Build 构建的 .app"
          fi
          
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: 未找到 .app"
            find build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          
          echo "=== APP_PATH: $APP_PATH ==="
          echo "=== 原始 .app 大小 ==="
          du -sh "$APP_PATH"
          
          echo "=== 原始 .app 内容 ==="
          ls -la "$APP_PATH"
          
          echo "=== Frameworks ==="
          ls -la "$APP_PATH/Frameworks" 2>/dev/null || echo "没有 Frameworks"
          
          # 创建 Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # 清理签名
          rm -rf Payload/${SCHEME}.app/_CodeSignature
          rm -f Payload/${SCHEME}.app/embedded.mobileprovision 2>/dev/null || true
          
          # 检查 Swift 支持文件
          echo "=== Swift 支持文件 ==="
          find Payload/${SCHEME}.app -name "*.dylib" -o -name "libswift*" 2>/dev/null | head -10
          
          # 打包
          zip -r MobileO-unsigned.ipa Payload
          
          echo "=== IPA 大小 ==="
          ls -lh MobileO-unsigned.ipa
          
          echo "=== IPA 内容 ==="
          unzip -l MobileO-unsigned.ipa | head -40

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-unsigned-ipa
          path: MobileO-unsigned.ipa
          if-no-files-found: error

      - name: Upload Debug Info on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: build.log
