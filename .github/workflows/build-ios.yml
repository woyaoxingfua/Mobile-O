name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version
          sudo xcodebuild -downloadPlatform iOS || true
          xcodebuild -showsdks
      
      - name: Modify Project Settings
        working-directory: Mobile-O-App/app
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = Q3GRH2LZ7S;/DEVELOPMENT_TEAM = "";/g' MobileO.xcodeproj/project.pbxproj
      
      - name: Build Archive
        working-directory: Mobile-O-App/app
        run: |
          # 使用 archive 构建，这样能得到完整的 .app
          xcodebuild archive \
            -project MobileO.xcodeproj \
            -scheme MobileO \
            -configuration Release \
            -archivePath MobileO.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal" \
            2>&1 | tee build.log
          
          # 检查 archive 是否生成
          if [ ! -d "MobileO.xcarchive" ]; then
            echo "ERROR: Archive 未生成"
            cat build.log | tail -100
            exit 1
          fi
          
          echo "=== Archive 结构 ==="
          find MobileO.xcarchive -name "*.app" -o -name "*.framework" | head -20
          
          # 检查 .app 内容
          APP_PATH=$(find MobileO.xcarchive -name "MobileO.app" -type d | head -1)
          echo "=== App 内容 ==="
          ls -la "$APP_PATH"
          echo "=== Frameworks ==="
          ls -la "$APP_PATH/Frameworks" 2>/dev/null || echo "无 Frameworks"
          
      - name: Package IPA
        working-directory: Mobile-O-App/app
        run: |
          APP_PATH=$(find MobileO.xcarchive -name "MobileO.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: 未找到 MobileO.app"
            exit 1
          fi
          
          echo "打包 App: $APP_PATH"
          
          # 创建 Payload 目录
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # 检查 Payload 内容
          echo "=== Payload 内容 ==="
          ls -la Payload/MobileO.app
          echo "=== Payload Frameworks ==="
          ls -la Payload/MobileO.app/Frameworks 2>/dev/null || echo "无 Frameworks"
          
          # 移除签名目录
          rm -rf Payload/MobileO.app/_CodeSignature
          rm -f Payload/MobileO.app/CodeResources
          
          # 创建 IPA
          zip -qr MobileO_Unsigned_iOS18.ipa Payload
          
          echo "=== IPA 信息 ==="
          ls -lh MobileO_Unsigned_iOS18.ipa
          unzip -l MobileO_Unsigned_iOS18.ipa | head -30
          
      - name: Verify IPA
        working-directory: Mobile-O-App/app
        run: |
          echo "=== 解压验证 ==="
          mkdir -p verify
          unzip -q MobileO_Unsigned_iOS18.ipa -d verify
          
          echo "=== 验证 .app 结构 ==="
          ls -la verify/Payload/MobileO.app
          
          echo "=== 检查 Info.plist ==="
          cat verify/Payload/MobileO.app/Info.plist | head -50 || echo "Info.plist 是二进制格式"
          
          echo "=== 检查可执行文件 ==="
          ls -la verify/Payload/MobileO.app/MobileO 2>/dev/null || echo "无可执行文件"
          
          echo "=== 检查 Frameworks ==="
          ls -la verify/Payload/MobileO.app/Frameworks 2>/dev/null || echo "无 Frameworks"
          
          rm -rf verify
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-Unsigned-iOS18
          path: Mobile-O-App/app/MobileO_Unsigned_iOS18.ipa
          
      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: Mobile-O-App/app/build.log
