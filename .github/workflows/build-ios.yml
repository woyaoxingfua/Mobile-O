name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    env:
      APP_DIR: Mobile-O-App/app
      XCODEPROJ: MobileO.xcodeproj
      SCHEME: MobileO
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Modify Project Settings
        shell: bash
        run: |
          PROJECT_FILE="${APP_DIR}/${XCODEPROJ}/project.pbxproj"
          
          # 修改 iOS 版本 (兼容性)
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          
          # 修改签名配置：使用 Manual
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"
          
          echo "=== 验证配置 ==="
          grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -3

      - name: Build Archive
        shell: bash
        run: |
          set -euxo pipefail
          
          # 使用 Ad-hoc 签名 (-) 进行 Archive
          # 这会嵌入 Frameworks，然后我们再移除签名
          
          xcodebuild clean archive \
            -project "${APP_DIR}/${XCODEPROJ}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -archivePath "build/MobileO.xcarchive" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath "SourcePackages" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="-" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal -Xfrontend -disable-availability-checking -suppress-warnings" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=NO \
            LD_RUNPATH_SEARCH_PATHS="@executable_path/Frameworks" \
            STRIP_INSTALLED_PRODUCT=YES \
            DEPLOYMENT_POSTPROCESSING=YES \
            2>&1 | tee build.log

      - name: Export and Package IPA
        shell: bash
        run: |
          set -euxo pipefail
          
          APP_PATH="build/MobileO.xcarchive/Products/Applications/${SCHEME}.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Archive 成功但未找到 .app，路径: $APP_PATH"
            exit 1
          fi
          
          echo "=== .app 大小检查 ==="
          du -sh "$APP_PATH"
          
          echo "=== 检查 Frameworks ==="
          ls -la "$APP_PATH/Frameworks" || echo "Frameworks 目录缺失!"
          
          # 创建 Payload 结构
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # 移除签名
          rm -rf Payload/${SCHEME}.app/_CodeSignature
          rm -f Payload/${SCHEME}.app/embedded.mobileprovision
          
          # 移除可执行文件的签名
          codesign --remove-signature "Payload/${SCHEME}.app/${SCHEME}" 2>/dev/null || true
          
          # 打包
          zip -r MobileO-unsigned.ipa Payload
          
          echo "=== 最终 IPA 信息 ==="
          ls -lh MobileO-unsigned.ipa
          unzip -l MobileO-unsigned.ipa | grep "Frameworks/" | head -20 || echo "IPA 中没有 Frameworks!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-unsigned-ipa
          path: MobileO-unsigned.ipa
          if-no-files-found: error

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
