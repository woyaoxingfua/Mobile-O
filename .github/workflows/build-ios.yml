name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version
          sudo xcodebuild -downloadPlatform iOS || true
      
      - name: Modify Project Settings
        working-directory: Mobile-O-App/app
        run: |
          PROJECT_FILE="MobileO.xcodeproj/project.pbxproj"
          
          # 修改 iOS 版本
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          
          # 禁用代码签名
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/DEVELOPMENT_TEAM = Q3GRH2LZ7S;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"
          
          echo "=== 验证修改 ==="
          grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -5
      
      - name: Build (using build command - like 75a48b0)
        working-directory: Mobile-O-App/app
        run: |
          # 使用 build 命令（75a48b0 成功版本的方式）
          xcodebuild clean build \
            -project MobileO.xcodeproj \
            -scheme MobileO \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            SWIFT_VERSION=5 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal -Xfrontend -disable-availability-checking" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            2>&1 | tee build.log
          
          # 查找 .app 文件
          APP_PATH=$(find DerivedData -name "MobileO.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: 未找到 MobileO.app"
            find . -name "*.app" -type d 2>/dev/null
            tail -100 build.log
            exit 1
          fi
          
          echo "=== 找到 .app ==="
          echo "$APP_PATH"
          ls -la "$APP_PATH"
      
      - name: Package IPA
        working-directory: Mobile-O-App/app
        run: |
          # 查找构建好的 .app
          APP_PATH=$(find DerivedData -name "MobileO.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: 未找到 .app"
            exit 1
          fi
          
          echo "=== 检查 .app 结构 ==="
          ls -la "$APP_PATH"
          
          echo "=== 检查 Frameworks ==="
          ls -la "$APP_PATH/Frameworks" 2>/dev/null || echo "⚠️ 没有 Frameworks 目录！"
          
          # 创建 Payload
          rm -rf Payload
          mkdir -p Payload
          
          # 复制 .app
          cp -R "$APP_PATH" Payload/
          
          # 清理签名
          rm -rf Payload/MobileO.app/_CodeSignature
          rm -f Payload/MobileO.app/embedded.mobileprovision 2>/dev/null || true
          
          # 创建 IPA
          zip -qr MobileO_iOS18.ipa Payload
          
          echo "=== IPA 创建成功 ==="
          ls -lh MobileO_iOS18.ipa
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-iOS18-Full
          path: Mobile-O-App/app/MobileO_iOS18.ipa
          
      - name: Upload Debug Info (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: |
            Mobile-O-App/app/build.log
