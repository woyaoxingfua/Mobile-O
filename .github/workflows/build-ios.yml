name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version
          
          # е®‰иЈ… iOS е№іеЏ°
          sudo xcodebuild -downloadPlatform iOS || true
          
          # жЈЂжџҐеЏЇз”Ёзљ„ SDKs
          echo "=== Available SDKs ==="
          xcodebuild -showsdks
          
          # жЈЂжџҐеЏЇз”Ёзљ„ destinations
          echo "=== Available Destinations ==="
          cd Mobile-O-App/app
          xcodebuild -project MobileO.xcodeproj -scheme MobileO -showdestinations 2>&1 | head -50 || true
      
      - name: Modify Project Settings
        working-directory: Mobile-O-App/app
        run: |
          # дї®ж”№ iOS з‰€жњ¬ - дЅїз”Ё 18.0 е› дёє GitHub Actions еЏЇиѓЅеЏЄжњ‰ 18.0
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = Q3GRH2LZ7S;/DEVELOPMENT_TEAM = "";/g' MobileO.xcodeproj/project.pbxproj
      
      - name: Build IPA
        working-directory: Mobile-O-App/app
        run: |
          # е€†ејЂж‰§иЎЊ clean е’?build
          xcodebuild clean \
            -project MobileO.xcodeproj \
            -scheme MobileO \
            2>&1 || true
          
          # жћ„е»є .app - з¦Ѓз”Ё Swift 6 дёҐж је№¶еЏ‘жЈЂжџ?          xcodebuild build \
            -project MobileO.xcodeproj \
            -scheme MobileO \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal" \
            2>&1 | tee build.log
          
          # жџҐж‰ѕ .app ж–‡д»¶
          APP_PATH=$(find DerivedData -name "MobileO.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: жњЄж‰ѕе€?MobileO.appпјЊе°ќиЇ•жџҐж‰ѕд»»дЅ?.app"
            find . -name "*.app" -type d 2>/dev/null
            cat build.log | tail -200
            exit 1
          fi
          
          echo "ж‰ѕе€° App: $APP_PATH"
          
          # ж‰“еЊ… IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/MobileO.app/_CodeSignature 2>/dev/null || true
          zip -qr MobileO_Unsigned_iOS18.ipa Payload
          
          echo "IPA ж‰“еЊ…е®Њж€ђ"
          ls -lh MobileO_Unsigned_iOS18.ipa
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-Unsigned-iOS18
          path: Mobile-O-App/app/MobileO_Unsigned_iOS18.ipa
          
      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: Mobile-O-App/app/build.log
