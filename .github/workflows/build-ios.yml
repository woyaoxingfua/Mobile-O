name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    env:
      APP_DIR: Mobile-O-App/app
      XCODEPROJ: MobileO.xcodeproj
      SCHEME: MobileO
      CONFIGURATION: Release
      DERIVED_DATA: ${{ github.workspace }}/build/DerivedData
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Xcode version
        run: xcodebuild -version

      - name: List targets & schemes
        shell: bash
        run: |
          set -euxo pipefail
          xcodebuild -list -project "${APP_DIR}/${XCODEPROJ}"

      - name: Modify Project Settings
        shell: bash
        run: |
          set -euxo pipefail
          PROJECT_FILE="${APP_DIR}/${XCODEPROJ}/project.pbxproj"
          
          # 修改 iOS 版本
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          
          # 禁用代码签名
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/DEVELOPMENT_TEAM = Q3GRH2LZ7S;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"

      - name: Build unsigned .app
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf "${BUILD_DIR}"
          mkdir -p "${BUILD_DIR}"

          # 构建（确保嵌入 Swift 库和依赖）
          xcodebuild \
            -project "${APP_DIR}/${XCODEPROJ}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -sdk iphoneos \
            -derivedDataPath "${DERIVED_DATA}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            LD_RUNPATH_SEARCH_PATHS="@executable_path/Frameworks" \
            clean build \
            | tee "${BUILD_DIR}/xcodebuild.log"

          # 获取 App 路径
          APP_PATH="${DERIVED_DATA}/Build/Products/${CONFIGURATION}-iphoneos/${SCHEME}.app"
          test -d "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          
          echo "=== 检查原始 .app ==="
          ls -la "$APP_PATH"
          
          echo "=== 检查 Frameworks ==="
          ls -la "$APP_PATH/Frameworks" 2>/dev/null || echo "⚠️ 没有 Frameworks 目录"

      - name: Dump xcodebuild log on failure
        if: failure()
        shell: bash
        run: |
          echo "===== tail -n 400 build/xcodebuild.log ====="
          tail -n 400 build/xcodebuild.log || true

      - name: Package into IPA
        shell: bash
        run: |
          set -euxo pipefail
          
          # 创建标准的 Payload 目录结构
          mkdir -p Payload
          
          # 将生成的 .app 复制进去
          cp -R "$APP_PATH" Payload/
          
          # 确保 Frameworks 目录存在并检查内容
          echo "=== 原始 Frameworks ==="
          ls -la Payload/${SCHEME}.app/Frameworks/ 2>/dev/null || echo "⚠️ 没有 Frameworks 目录！"
          
          # 从 DerivedData 查找并复制所有 Frameworks（如果 Xcode 没有自动嵌入）
          echo "=== 从 DerivedData 查找 Frameworks ==="
          find "${DERIVED_DATA}" -name "*.framework" -type d 2>/dev/null | while read framework; do
            framework_name=$(basename "$framework")
            # 避免重复复制系统框架
            if [[ ! "$framework_name" =~ ^(UIKit|Foundation|Core|Swift|libswift).*$ ]]; then
              echo "发现框架: $framework_name"
              if [ ! -d "Payload/${SCHEME}.app/Frameworks/$framework_name" ]; then
                echo "  -> 复制到 App"
                mkdir -p "Payload/${SCHEME}.app/Frameworks"
                cp -R "$framework" "Payload/${SCHEME}.app/Frameworks/"
              fi
            fi
          done
          
          # 清理签名
          rm -rf Payload/${SCHEME}.app/_CodeSignature
          rm -f Payload/${SCHEME}.app/embedded.mobileprovision 2>/dev/null || true
          
          # 验证 Info.plist
          echo "=== Info.plist ==="
          plutil -p Payload/${SCHEME}.app/Info.plist | grep -E "CFBundleExecutable|CFBundleIdentifier|MinimumOSVersion"
          
          # 验证最终 Frameworks
          echo "=== 最终 Frameworks ==="
          ls -la Payload/${SCHEME}.app/Frameworks/ 2>/dev/null | head -30
          
          # 计算大小
          echo "=== App 大小 ==="
          du -sh Payload/${SCHEME}.app
          
          # 压缩成 .ipa
          zip -r MobileO-unsigned.ipa Payload
          
          echo "=== IPA 信息 ==="
          ls -lah MobileO-unsigned.ipa

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-unsigned-ipa
          path: MobileO-unsigned.ipa
          if-no-files-found: error
