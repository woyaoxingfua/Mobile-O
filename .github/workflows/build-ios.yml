name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks
      
      - name: Modify Project Settings
        working-directory: Mobile-O-App/app
        run: |
          # 修改 iOS 版本和签名设置
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' MobileO.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = Q3GRH2LZ7S;/DEVELOPMENT_TEAM = "";/g' MobileO.xcodeproj/project.pbxproj
      
      - name: Build IPA
        working-directory: Mobile-O-App/app
        run: |
          # 使用 xcodebuild 直接构建 .app，然后打包成 IPA
          xcodebuild clean build \
            -project MobileO.xcodeproj \
            -scheme MobileO \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.1 \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            2>&1 | tee build.log
          
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 即使构建有警告，也尝试找到 .app 文件
          APP_PATH=$(find DerivedData -name "MobileO.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: 未找到 MobileO.app"
            cat build.log | tail -100
            exit 1
          fi
          
          echo "找到 App: $APP_PATH"
          
          # 打包 IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/MobileO.app/_CodeSignature 2>/dev/null || true
          zip -qr MobileO_Unsigned_iOS18.1.ipa Payload
          
          echo "IPA 打包完成"
          ls -lh MobileO_Unsigned_iOS18.1.ipa
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-Unsigned-iOS18.1
          path: Mobile-O-App/app/MobileO_Unsigned_iOS18.1.ipa
          
      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: Mobile-O-App/app/build.log
