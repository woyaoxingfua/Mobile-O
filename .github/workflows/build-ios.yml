name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    env:
      APP_DIR: Mobile-O-App/app
      XCODEPROJ: MobileO.xcodeproj
      SCHEME: MobileO
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Setup Self-Signed Certificate
        run: |
          # 创建临时用于签名的自签名证书
          # 这样可以欺骗 Xcode 执行完整的 Embed Frameworks 流程
          
          # 1. 创建 Keychain
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # 2. 生成证书
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=MobileO Self Signed"
          openssl pkcs12 -export -out cert.p12 -inkey key.pem -in cert.pem -passout pass:password
          
          # 3. 导入 Keychain
          security import cert.p12 -k build.keychain -P password -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          
          # 4. 验证
          security find-identity -v -p codesigning build.keychain

      - name: Modify Project Settings
        shell: bash
        run: |
          PROJECT_FILE="${APP_DIR}/${XCODEPROJ}/project.pbxproj"
          
          # 修改 iOS 版本 (兼容性)
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1;/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/g' "$PROJECT_FILE"
          
          # 修改签名配置：使用 Manual 并在构建命令中指定自签名证书
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"
          
          echo "=== 验证配置 ==="
          grep "IPHONEOS_DEPLOYMENT_TARGET" "$PROJECT_FILE" | head -3

      - name: Build Archive
        shell: bash
        run: |
          set -euxo pipefail
          
          # 使用自签名证书进行 Archive
          # 关键点：CODE_SIGNING_ALLOWED=YES 配合具体的 IDENTITY
          # 这样 Xcode 会执行 Embed Frameworks 和 Swift StdLib copy
          
          xcodebuild clean archive \
            -project "${APP_DIR}/${XCODEPROJ}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -archivePath "build/MobileO.xcarchive" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath "SourcePackages" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="MobileO Self Signed" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal -Xfrontend -disable-availability-checking -suppress-warnings" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            LD_RUNPATH_SEARCH_PATHS="@executable_path/Frameworks" \
            2>&1 | tee build.log

      - name: Export and Package IPA
        shell: bash
        run: |
          set -euxo pipefail
          
          APP_PATH="build/MobileO.xcarchive/Products/Applications/${SCHEME}.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Archive 成功但未找到 .app，路径: $APP_PATH"
            exit 1
          fi
          
          echo "=== .app 大小检查 ==="
          du -sh "$APP_PATH"
          
          echo "=== 检查 Frameworks ==="
          ls -la "$APP_PATH/Frameworks" || echo "Frameworks 目录缺失!"
          
          # 创建 Payload 结构
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # 移除签名 (因为这是自签名的，由于没有 Profile，iOS 无论如何都不会信任)
          # 对于 LiveContainer/TrollStore，通常需要移除签名或伪签名
          # 这里我们移除 _CodeSignature 文件夹
          rm -rf Payload/${SCHEME}.app/_CodeSignature
          rm -f Payload/${SCHEME}.app/embedded.mobileprovision
          
          # 重新伪签名 (Ad-hoc) 以确保完整性校验 (可选，但在某些工具中更好)
          # codesign -s - --force --deep Payload/${SCHEME}.app
          # 用户要求 "unsigned" 这里的定义可能是不包含 Apple 签名，
          # 或者是完全没有签名块。上面的 rm -rf _CodeSignature 实现了完全无签名。
          
          # 打包
          zip -r MobileO-unsigned.ipa Payload
          
          echo "=== 最终 IPA 信息 ==="
          ls -lh MobileO-unsigned.ipa
          unzip -l MobileO-unsigned.ipa | grep "Frameworks/" | head -20 || echo "IPA 中没有 Frameworks!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-unsigned-ipa
          path: MobileO-unsigned.ipa
          if-no-files-found: error

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
