name: Build Unsigned IPA (iOS 18.1)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || echo "Using default Xcode"
          xcodebuild -version

      - name: Build Unsigned App
        run: |
          cd Mobile-O-App/app
          xcodebuild clean build \
            -project MobileO.xcodeproj \
            -scheme MobileO \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO" \
            IPHONEOS_DEPLOYMENT_TARGET="18.1" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build"

      - name: Package into Unsigned IPA
        run: |
          cd Mobile-O-App/app
          mkdir -p Payload
          mv build/MobileO.app Payload/
          zip -qr MobileO-Unsigned-iOS18.1.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileO-Unsigned-IPA
          path: Mobile-O-App/app/MobileO-Unsigned-iOS18.1.ipa
          retention-days: 7
