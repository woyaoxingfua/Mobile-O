name: Build Unsigned IPA (iOS 18.1)

on:
  workflow_dispatch: # 允许您在 GitHub Actions 页面手动点击按钮触发编译
  push:
    branches:
      - main # 当有代码推送到 main 分支时自动触发 (可按需注释掉)

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest # 使用最新的 macOS 运行器 (包含最新的 Xcode)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        # iOS 18.1 需要 Xcode 16.1 或更高版本
        run: sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Unsigned App
        run: |
          # 进入 iOS 项目所在目录
          cd Mobile-O-App
          
          # 使用 xcodebuild 编译 Release 版本的 .app
          # 强制指定目标版本为 18.1，并彻底禁用所有签名校验
          xcodebuild clean build \
            -project "Mobile-O.xcodeproj" \
            -scheme "Mobile-O" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO" \
            IPHONEOS_DEPLOYMENT_TARGET="18.1" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build"

      - name: Package App into IPA
        run: |
          cd Mobile-O-App
          
          # 标准的 IPA 结构需要一个名为 Payload 的文件夹
          mkdir -p Payload
          
          # 将刚才编译出的 .app 移动到 Payload 文件夹中
          # 注意：这里的 Mobile-O.app 名称取决于 Xcode 中 Target 的名称，如有不同请在此处修改
          mv build/Mobile-O.app Payload/
          
          # 压缩成无签名的 .ipa 文件
          zip -qr ../Mobile-O-iOS18.1-Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-O-Unsigned-IPA
          path: Mobile-O-iOS18.1-Unsigned.ipa
          retention-days: 7 # 生成的文件将在 GitHub 上保留 7 天