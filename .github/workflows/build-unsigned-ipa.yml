name: Build Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'iOS Deployment Target (e.g. 18.1)'
        required: false
        default: '18.1'
  push:
    branches:
      - main
    paths:
      - 'Mobile-O-App/**'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120
    permissions:
      contents: read

    env:
      PROJECT_PATH: Mobile-O-App/app/MobileO.xcodeproj
      SCHEME: MobileO
      PRODUCT_NAME: MobileO
      ARCHIVE_PATH: ${{ github.workspace }}/build/MobileO.xcarchive
      SPM_PATH: ${{ github.workspace }}/SPM
      DEPLOYMENT_TARGET: ${{ github.event.inputs.deployment_target || '18.1' }}

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug - List all Xcode versions and their SDKs
        run: |
          echo "=== All Xcode installations ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "none"

          echo ""
          for xcode in /Applications/Xcode*.app; do
            echo "=== $xcode ==="
            "$xcode/Contents/Developer/usr/bin/xcodebuild" -version 2>/dev/null || true
            echo "--- iOS SDKs ---"
            "$xcode/Contents/Developer/usr/bin/xcodebuild" -showsdks 2>/dev/null | grep -i "iphoneos" || echo "  (none)"
            echo ""
          done

      - name: Select Xcode with working iOS SDK
        run: |
          # 遍历所有 Xcode，找到一个有 iphoneos SDK 的版本
          SELECTED=""
          for xcode in $(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V); do
            if "$xcode/Contents/Developer/usr/bin/xcodebuild" -showsdks 2>/dev/null | grep -q "iphoneos"; then
              SELECTED="$xcode"
              echo "Found Xcode with iOS SDK: $SELECTED"
            fi
          done

          if [ -z "$SELECTED" ]; then
            echo "::error::No Xcode with iOS SDK found! Attempting to download..."
            # 先选 Xcode 16.2 然后下载 iOS 平台
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer 2>/dev/null || \
              sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

            echo "Downloading iOS platform (this may take 10+ minutes)..."
            xcodebuild -downloadPlatform iOS || true

            echo "Checking again..."
            xcodebuild -showsdks | grep -i ios || true
          else
            sudo xcode-select -s "$SELECTED/Contents/Developer"
          fi

          echo ""
          echo "=== Selected Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== Available iOS SDKs ==="
          xcodebuild -showsdks | grep -i ios || echo "STILL NO iOS SDK!"
          echo ""
          echo "=== Available destinations for scheme ==="
          xcodebuild -project "$PROJECT_PATH" -scheme "$SCHEME" -showdestinations 2>/dev/null | head -20 || true

      - name: Cache Swift Package dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.SPM_PATH }}
          key: spm-${{ runner.os }}-${{ hashFiles('Mobile-O-App/app/MobileO.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath "$SPM_PATH"

      - name: Build and Archive (unsigned)
        run: |
          set -o pipefail
          gem list xcpretty -i >/dev/null 2>&1 || gem install xcpretty --no-document
          mkdir -p "$(dirname "$ARCHIVE_PATH")"

          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            -clonedSourcePackagesDirPath "$SPM_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_APP_SANDBOX=NO \
            ENABLE_HARDENED_RUNTIME=NO \
            ONLY_ACTIVE_ARCH=NO \
            "IPHONEOS_DEPLOYMENT_TARGET=$DEPLOYMENT_TARGET" \
            2>&1 | xcpretty --color || \
            (echo "::warning::xcpretty failed, re-running with raw output" && \
              xcodebuild archive \
                -project "$PROJECT_PATH" \
                -scheme "$SCHEME" \
                -configuration Release \
                -destination "generic/platform=iOS" \
                -sdk iphoneos \
                -archivePath "$ARCHIVE_PATH" \
                -clonedSourcePackagesDirPath "$SPM_PATH" \
                CODE_SIGN_IDENTITY="" \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGNING_ALLOWED=NO \
                AD_HOC_CODE_SIGNING_ALLOWED=YES \
                CODE_SIGN_ENTITLEMENTS="" \
                DEVELOPMENT_TEAM="" \
                PROVISIONING_PROFILE_SPECIFIER="" \
                ENABLE_APP_SANDBOX=NO \
                ENABLE_HARDENED_RUNTIME=NO \
                ONLY_ACTIVE_ARCH=NO \
                "IPHONEOS_DEPLOYMENT_TARGET=$DEPLOYMENT_TARGET")

      - name: Verify archive
        run: |
          APP_PATH="$ARCHIVE_PATH/Products/Applications/$PRODUCT_NAME.app"
          echo "=== Archive contents ==="
          ls -la "$ARCHIVE_PATH/Products/Applications/"
          echo ""
          echo "=== Info.plist MinimumOSVersion ==="
          /usr/libexec/PlistBuddy -c "Print MinimumOSVersion" "$APP_PATH/Info.plist" 2>/dev/null || echo "not found"
          echo ""
          echo "=== Binary architectures ==="
          lipo -info "$APP_PATH/$PRODUCT_NAME" 2>/dev/null || file "$APP_PATH/$PRODUCT_NAME" || true
          echo ""
          echo "=== App bundle size ==="
          du -sh "$APP_PATH"

      - name: Create unsigned IPA
        run: |
          APP_PATH="$ARCHIVE_PATH/Products/Applications/$PRODUCT_NAME.app"
          IPA_NAME="${PRODUCT_NAME}-unsigned-iOS${DEPLOYMENT_TARGET}.ipa"
          IPA_DIR="${GITHUB_WORKSPACE}/build/ipa"
          PAYLOAD_DIR="$IPA_DIR/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          rm -rf "$PAYLOAD_DIR/$PRODUCT_NAME.app/_CodeSignature"
          rm -f  "$PAYLOAD_DIR/$PRODUCT_NAME.app/embedded.mobileprovision"
          cd "$IPA_DIR"
          zip -qr "${GITHUB_WORKSPACE}/build/${IPA_NAME}" Payload/
          echo "IPA created:"
          ls -lh "${GITHUB_WORKSPACE}/build/${IPA_NAME}"
          echo "IPA_NAME=${IPA_NAME}" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_NAME }}
          path: ${{ github.workspace }}/build/${{ env.IPA_NAME }}
          retention-days: 90
          if-no-files-found: error
